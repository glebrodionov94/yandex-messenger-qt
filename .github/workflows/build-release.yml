name: Build and release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ubuntu:
    name: Ubuntu 24.04 x86_64
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            build-essential \
            cmake \
            ninja-build \
            dpkg-dev \
            qt6-base-dev \
            qt6-webengine-dev

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Build Debian package
        run: |
          cd build
          cpack -G DEB

      - name: Verify Debian package
        run: test -n "$(find build -maxdepth 1 -name '*.deb' -print -quit)"

      - name: Prepare downloadable files
        run: |
          set -euo pipefail
          mkdir -p dist portable
          cp build/*.deb dist/
          cp build/yandex-messenger-qt portable/
          cp README-BINARY.md portable/README.md
          tar -C portable -czf dist/yandex-messenger-qt-linux-x86_64.tar.gz .
          (
            cd dist
            sha256sum ./* > SHA256SUMS
          )

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: yandex-messenger-qt-ubuntu-24.04-x86_64
          path: dist/
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --generate-notes \
            --title "${GITHUB_REF_NAME}"
